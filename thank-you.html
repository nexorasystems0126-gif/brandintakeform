<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brief Received — Nexora Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --nx-graphite: #0B0D0E;
  --nx-soft-black: #111315;
  --nx-charcoal-panel: #181B1E;
  --nx-warm-ivory: #F4F1EA;
  --nx-muted-stone: #A8A29A;
  --nx-signature-gold: #C8A96A;
  --nx-system-green: #7CFFB2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--nx-graphite);
  color:var(--nx-warm-ivory);
  font-family:'Space Grotesk',sans-serif;
  padding:32px;
}
.card{
  max-width:560px;
  text-align:center;
  background:var(--nx-soft-black);
  border:1px solid #2A2E33;
  padding:48px 32px;
  border-radius:16px;
}
.mark{
  width:72px;height:72px;
  margin:0 auto 24px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(124,255,178,.08);
  border:1px solid rgba(124,255,178,.3);
  color:var(--nx-system-green);
  font-size:32px;
}
h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(30px,6vw,48px);
  line-height:1;
  margin-bottom:14px;
  background:linear-gradient(135deg,var(--nx-warm-ivory),var(--nx-signature-gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
p{color:var(--nx-muted-stone);line-height:1.8;font-size:15px}
a{
  display:inline-block;
  margin-top:28px;
  padding:14px 24px;
  border-radius:8px;
  background:var(--nx-signature-gold);
  color:var(--nx-graphite);
  text-decoration:none;
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:700;
}
</style>
</head>
<body>
  <div class="card">
    <div class="mark">✦</div>
    <h1>Brief Received</h1>
    <p>Your photography brand intake has been submitted successfully. Nexora Systems will review your brief and follow up shortly.</p>
    <a href="/">Back to Form</a>
  </div>
</body>
</html>
